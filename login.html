<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DreamHubs | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MX4VTG8NTL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MX4VTG8NTL');
  </script>
</head>
  <body class="auth-single" data-google-client-id="184790123400-pbah8rr03a6csnea4m9m4gsae7vt9bkq.apps.googleusercontent.com">
    <div class="auth-shell auth-single-shell">
      <section class="auth-card">
        <div class="theme-switcher" role="group" aria-label="Theme switcher">
          <button class="theme-btn" data-theme-choice="light">Light</button>
          <button class="theme-btn" data-theme-choice="dark">Dark</button>
          <button class="theme-btn" data-theme-choice="system">Auto</button>
        </div>
        <div class="auth-box">
          <p class="eyebrow">LOGIN</p>
          <h2>Access your DreamHubs panel</h2>
          <div class="order-form"><div data-google-signin></div><p class="auth-note" data-google-status aria-live="polite"></p></div>
          <form class="order-form" data-login-form>
            <label>
              Email or username
              <input type="text" name="emailOrUsername" placeholder="Enter your email or username" required />
            </label>
            <label>
              Password
              <div class="password-field">
                <input type="password" name="password" placeholder="Enter your password" required />
                <button type="button" class="toggle-password" onclick="togglePassword(this)">Show</button>
              </div>
            </label>
            <button type="submit" class="primary-btn full">Login</button>
            <p class="auth-note" data-login-status aria-live="polite"></p>
          </form>
          <button type="button" class="demo-login-btn" data-demo-login>Demo Login (Frontend Only)</button>
          <p class="auth-note" style="margin-top:8px;">Use this to preview UI without backend/API.</p>
          <div class="auth-meta">
            <a href="forgot-password.html">Forgot password?</a>
            <a href="register.html">Create account</a>
          </div>
        </div>
      </section>
    </div>
    <script src="assets/app.js"></script>
    <script src="assets/backend.js"></script>
  </body>
</html>
