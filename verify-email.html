<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Email - DreamHubs</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .verify-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg);
        }
        .verify-card {
            background: var(--surface);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--line);
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        .btn-home {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-home:hover { opacity: 0.9; transform: translateY(-2px); }
        .loading-spinner {
            border: 4px solid var(--line);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card" id="statusCard">
            <div class="loading-spinner" id="spinner"></div>
            <h2 id="statusTitle">Verifying...</h2>
            <p id="statusMessage">Please wait while we confirm your email address.</p>
            <a href="dashboard.html" class="btn-home" style="display: none;" id="homeBtn">Go to Dashboard</a>
        </div>
    </div>

    <script src="assets/backend.js"></script>
    <script>
        async function verify() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const title = document.getElementById('statusTitle');
            const msg = document.getElementById('statusMessage');
            const spinner = document.getElementById('spinner');
            const homeBtn = document.getElementById('homeBtn');

            if (!token) {
                title.innerText = "Invalid Link";
                msg.innerText = "The verification link is missing or broken.";
                spinner.style.display = "none";
                return;
            }

            try {
                const res = await fetch(`/api/auth/verify-email?token=${token}`);
                const data = await res.json();

                spinner.style.display = "none";
                if (res.ok) {
                    title.innerText = "Email Verified!";
                    msg.innerText = "Thank you! Your email has been verified. You can now access all features including referrals.";
                    homeBtn.style.display = "inline-block";
                    
                    // Update local user state if logged in
                    const user = JSON.parse(localStorage.getItem('dreamuser') || '{}');
                    if (user.id) {
                        user.isEmailVerified = true;
                        localStorage.setItem('dreamuser', JSON.stringify(user));
                    }
                } else {
                    title.innerText = "Verification Failed";
                    msg.innerText = data.error || "We couldn't verify your email. The link may have expired.";
                }
            } catch (err) {
                spinner.style.display = "none";
                title.innerText = "Error";
                msg.innerText = "Something went wrong. Please try again later.";
            }
        }
        verify();
    </script>
</body>
</html>
