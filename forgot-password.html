<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DreamHubs | Forgot password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="icon" href="assets/icon.png">
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MX4VTG8NTL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MX4VTG8NTL');
  </script>
</head>
  <body class="auth-single">
    <div class="auth-shell auth-single-shell">
      <section class="auth-card">
        <div class="auth-box">
          <p class="eyebrow">RESET ACCESS</p>
          <h2>Send password reset link</h2>
          <form class="order-form" data-forgot-page-form>
            <label>
              Account email
              <input type="email" name="email" placeholder="Enter your account email" required />
            </label>
            <button type="submit" class="primary-btn full">Send reset link</button>
            <p class="auth-note" data-forgot-page-status aria-live="polite"></p>
          </form>
          <div class="auth-meta">
            <a href="login.html">Back to login</a>
          </div>
        </div>
      </section>
    </div>
    <script src="assets/app.js"></script>
    <script src="assets/backend.js"></script>
  </body>
</html>
