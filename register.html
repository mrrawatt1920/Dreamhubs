<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DreamHubs | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MX4VTG8NTL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MX4VTG8NTL');
  </script>
</head>
  <body>
    <div class="auth-shell">
      <section class="auth-visual">
        <a class="brand" href="index.html">
          <img src="assets/logo.png" alt="DreamHubs Logo" style="height: 40px; width: auto; object-fit: contain;">
        </a>
        <p class="eyebrow">CREATE ACCOUNT</p>
        <h1>Join the hub built for creator growth and smooth ordering.</h1>
        <p class="hero-text">
          This registration screen is part of the same visual system as the
          dashboard so the experience feels product-like from the start.
        </p>
      </section>
      <section class="auth-card">
        <div class="theme-switcher" role="group" aria-label="Theme switcher">
          <button class="theme-btn" data-theme-choice="light">Light</button>
          <button class="theme-btn" data-theme-choice="dark">Dark</button>
          <button class="theme-btn" data-theme-choice="system">Auto</button>
        </div>
        <div class="auth-box">
          <p class="eyebrow">REGISTER</p>
          <h2>Create your DreamHubs account</h2>
          <form class="order-form auth-grid" data-register-form>
            <label>
              Full name
              <input type="text" name="name" placeholder="Your name" required />
            </label>
            <label>
              Username
              <input type="text" name="username" placeholder="Choose username" required />
            </label>
            <label>
              Email
              <input type="email" name="email" placeholder="Enter email" required />
            </label>
            <label>
              Password
              <div class="password-field">
                <input type="password" name="password" placeholder="Create password" required />
                <button type="button" class="toggle-password" onclick="togglePassword(this)">Show</button>
              </div>
            </label>
            <label>
              Confirm password
              <div class="password-field">
                <input type="password" name="confirmPassword" placeholder="Confirm password" required />
                <button type="button" class="toggle-password" onclick="togglePassword(this)">Show</button>
              </div>
            </label>
            <button type="submit" class="primary-btn full auth-span">Create Account</button>
            <p class="auth-note auth-span" data-register-status aria-live="polite"></p>
          </form>
          <div class="auth-meta">
            <span>Already have an account?</span>
            <a href="login.html">Login now</a>
          </div>
        </div>
      </section>
    </div>
    <script src="assets/app.js"></script>
    <script src="assets/backend.js"></script>
  </body>
</html>
