<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DreamHubs | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MX4VTG8NTL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MX4VTG8NTL');
  </script>
</head>
  <body>
    <div class="auth-shell">
      <section class="auth-visual">
        <a class="brand" href="login.html">
          <span class="brand-mark">DH</span>
          <span>DreamHubs</span>
        </a>
        <p class="eyebrow">RESET PASSWORD</p>
        <h1>Create a fresh password for your account.</h1>
        <p class="hero-text">
          This reset link is time-limited. Enter a new password and continue back to login.
        </p>
      </section>
      <section class="auth-card">
        <div class="auth-box">
          <p class="eyebrow">SECURITY</p>
          <h2>Reset your password</h2>
          <p class="auth-note" data-reset-status aria-live="polite"></p>
          <form class="order-form" data-reset-form>
            <label>
              New password
              <input type="password" name="newPassword" placeholder="Enter new password" />
            </label>
            <label>
              Confirm password
              <input type="password" name="confirmPassword" placeholder="Confirm new password" />
            </label>
            <button type="submit" class="primary-btn full">Update Password</button>
          </form>
        </div>
      </section>
    </div>
    <script src="assets/app.js"></script>
    <script src="assets/backend.js"></script>
  </body>
</html>
